<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ollama Universe</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; color:#0f0; font-family:monospace;}
  canvas { display:block; }
  #log { position:absolute; top:0; left:0; padding:10px; max-height:200px; overflow:auto; background: rgba(0,0,0,0.5);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.3/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
</head>
<body>

<div id="log"></div>

<script>
$(function(){
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 50;

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambient);

  const pointLight = new THREE.PointLight(0xffffff, 1.2);
  scene.add(pointLight);

  // Verbose logging helper
  function log(msg){
    const logDiv = document.getElementById('log');
    const entry = document.createElement('div');
    entry.textContent = msg;
    logDiv.appendChild(entry);
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(msg);
  }

  // Universe parameters
  const NUM_ATOMS = 50;      // number of nuclei
  const MAX_ELECTRONS = 4;   // max electrons per atom

  const atoms = [];

  // Initialize atoms
  for(let i=0; i<NUM_ATOMS; i++){
    const nucleusGeo = new THREE.SphereGeometry(1 + Math.random()*0.5, 16,16);
    const nucleusMat = new THREE.MeshStandardMaterial({
      color: Math.random()*0xffffff,
      emissive: Math.random()*0xffffff
    });
    const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);

    nucleus.position.set(
      (Math.random()-0.5)*100,
      (Math.random()-0.5)*50,
      (Math.random()-0.5)*50
    );

    // electrons
    const numElectrons = 1 + Math.floor(Math.random()*MAX_ELECTRONS);
    const electrons = [];

    for(let j=0;j<numElectrons;j++){
      const eGeo = new THREE.SphereGeometry(0.2 + Math.random()*0.2, 8, 8);
      const eMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffff});
      const electron = new THREE.Mesh(eGeo, eMat);

      electron.userData.radius = 2 + j*0.5 + Math.random();
      electron.userData.angle = Math.random()*Math.PI*2;
      electron.userData.speed = 0.01 + Math.random()*0.02;
      electron.userData.nucleus = nucleus;

      electrons.push(electron);
      scene.add(electron);

      // Electron pulse
      (function(e){
        gsap.to(e.scale, {
          x: 0.2 + Math.random()*0.2,
          y: 0.2 + Math.random()*0.2,
          z: 0.2 + Math.random()*0.2,
          duration: 0.5 + Math.random()*1,
          ease:"sine.inOut",
          onComplete: ()=>arguments.callee(e)
        });
      })(electron);

      log(`Atom #${i} spawned electron #${j} with radius ${electron.userData.radius.toFixed(2)}`);
    }

    nucleus.userData.electrons = electrons;
    atoms.push(nucleus);
    scene.add(nucleus);

    log(`Created atom #${i} at x:${nucleus.position.x.toFixed(1)}, y:${nucleus.position.y.toFixed(1)}, z:${nucleus.position.z.toFixed(1)} with ${numElectrons} electrons`);
  }

  // Responsive
  $(window).on('resize', function(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animate electrons
  function animateUniverse(){
    atoms.forEach((atom, i) => {
      atom.userData.electrons.forEach((e, j) => {
        e.userData.angle += e.userData.speed;
        e.position.x = atom.position.x + Math.cos(e.userData.angle) * e.userData.radius;
        e.position.z = atom.position.z + Math.sin(e.userData.angle) * e.userData.radius;
        e.position.y = atom.position.y + Math.sin(e.userData.angle*2) * 0.5;

        // verbose log occasionally
        if(Math.random()<0.001){
          log(`Atom #${i} electron #${j} at x:${e.position.x.toFixed(1)}, y:${e.position.y.toFixed(1)}, z:${e.position.z.toFixed(1)}`);
        }
      });
    });
  }

  function render(){
    requestAnimationFrame(render);
    animateUniverse();
    renderer.render(scene, camera);
  }

  render();
});
</script>
</body>
</html>
